<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Counterpart — Voice</title>
<link rel="manifest" href="manifest-voice.json">
<meta name="theme-color" content="#0a2540">
<link rel="icon" href="icons/favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Counterpart Voice">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --earth:#ffffff; --earth-mid:#eef1f5; --earth-light:#e2e8f0; --earth-lift:#f7f9fb; --earth-deep:#f3f5f8;
  --ember:#635bff; --ember-warm:#5249e0; --ember-pale:#3730a3; --ember-dim:#e8e6ff; --ember-glow:rgba(99,91,255,0.08);
  --cream:#0a2540; --cream-mid:#5a6675; --cream-dim:#7e8a98; --cream-faint:#dde2e8;
  --red-err:#c0392b; --green-ok:#2f855a; --green-dim:#e3f2e9; --blue-info:#3a6ea5; --blue-dim:#e7eef6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--earth);color:var(--cream);font-family:'Open Sans',sans-serif;font-weight:400;
  height:100vh;line-height:1.6;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
button{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--cream-dim);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--cream-dim)}

/* ════ KEY SCREEN ════ */
.key-screen{
  position:fixed;inset:0;z-index:60;background:var(--earth-deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;
}
.key-screen.gone{display:none}
.flame-icon{width:48px;height:48px;margin-bottom:2.5rem;opacity:0.25;transition:opacity 0.5s ease}
.flame-icon.alive{opacity:0.7}
.key-input-wrap{width:100%;max-width:280px}
.key-input{
  width:100%;font-family:'Open Sans',sans-serif;font-size:14px;font-weight:400;letter-spacing:0.18em;
  text-align:center;text-transform:uppercase;background:transparent;border:none;
  border-bottom:1px solid var(--cream-mid);color:var(--cream);padding:10px 0 14px;outline:none;
  transition:border-color 0.25s;caret-color:var(--ember)
}
.key-input::placeholder{color:var(--cream-dim);font-weight:400;letter-spacing:0.06em;text-transform:none}
.key-input:focus{border-bottom-color:var(--ember)}
.key-input.wrong{border-bottom-color:var(--red-err);animation:shk 0.4s ease}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.key-hint{margin-top:1.1rem;font-size:11px;letter-spacing:0.07em;color:var(--cream-dim);text-align:center;min-height:1.2em;transition:color 0.2s}
.key-hint.err{color:var(--red-err)}
.key-tagline{margin-top:3rem;font-family:'Open Sans',sans-serif;font-style:italic;font-size:17px;color:var(--cream-dim);text-align:center;max-width:300px;line-height:1.5}

/* ════ APP SHELL ════ */
.app-shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;opacity:0;transition:opacity 0.5s ease}
.app-shell.ready{opacity:1}

/* ════ HEADER ════ */
.v-header{
  display:flex;align-items:center;gap:10px;padding:0.8rem 1.1rem;border-bottom:1px solid var(--cream-faint);
  background:rgba(255,255,255,0.75);backdrop-filter:blur(6px);flex-shrink:0
}
.wordmark{display:flex;align-items:center;gap:9px}
.wm-name{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;letter-spacing:0.04em;color:var(--cream)}
.wm-ember{width:6px;height:6px;border-radius:50%;background:var(--ember);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:0.4;transform:scale(0.85)}50%{opacity:1;transform:scale(1.1)}}
.hdr-pill{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ember-warm);background:var(--ember-dim);border-radius:10px;padding:3px 9px}
.hdr-spacer{flex:1}
.lang-select{
  background:var(--earth-mid);border:1px solid var(--cream-faint);border-radius:6px;color:var(--cream-dim);
  font-family:inherit;font-size:11px;padding:5px 7px;cursor:pointer;outline:none;transition:border-color 0.2s
}
.lang-select:hover{border-color:var(--ember)}
.icon-btn{background:transparent;border:1px solid transparent;border-radius:6px;color:var(--cream-dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:6px;transition:all 0.18s}
.icon-btn:hover{color:var(--ember);background:var(--ember-glow)}
.icon-btn.on{color:var(--ember);background:var(--ember-glow);border-color:var(--ember-dim)}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.key-badge{font-size:10.5px;letter-spacing:0.06em;color:var(--cream-dim);display:flex;align-items:center;gap:6px}
.key-badge .kd{width:5px;height:5px;border-radius:50%;background:var(--green-ok)}
.foot-link{font-size:12px;font-weight:500;color:var(--cream-dim);background:none;border:none;cursor:pointer;transition:color 0.2s}
.foot-link:hover{color:var(--red-err)}

/* ════ CONVERSATION ════ */
.v-main{flex:1;overflow-y:auto;scroll-behavior:smooth}
.convo-inner{max-width:680px;margin:0 auto;padding:2rem 1.5rem 1rem}
.welcome-block{margin-bottom:2.5rem;animation:riseIn 0.5s ease}
.welcome-rule{width:32px;height:1px;background:var(--ember);margin-bottom:2rem}
.welcome-head{font-family:'Montserrat',sans-serif;font-size:44px;font-weight:700;line-height:1.12;letter-spacing:-0.02em;color:var(--cream);margin-bottom:1.25rem}
.welcome-head em{font-style:italic;color:var(--ember-warm)}
.welcome-body{font-size:16px;font-weight:400;color:var(--cream-mid);line-height:1.9;max-width:480px}

.msg{margin-bottom:1.75rem;animation:riseIn 0.3s ease}
@keyframes riseIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-person{display:flex;justify-content:flex-end}
.msg-person-bubble{max-width:82%;background:var(--earth-lift);border:1px solid var(--cream-faint);
  border-radius:16px 16px 2px 16px;padding:12px 16px;font-size:16px;font-weight:400;color:var(--cream);line-height:1.75;word-wrap:break-word}
.msg-cp{display:flex;gap:12px;align-items:flex-start}
.cp-mark{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--ember-dim);border:1px solid var(--ember);display:flex;align-items:center;justify-content:center;margin-top:3px}
.cp-mark-dot{width:6px;height:6px;border-radius:50%;background:var(--ember-warm);animation:breathe 3s ease-in-out infinite}
.msg-cp-inner{flex:1;min-width:0}
.msg-cp-bubble{font-size:16px;font-weight:400;color:var(--cream-mid);line-height:1.9;word-wrap:break-word}
.msg-cp-bubble p{margin-bottom:0.75em}
.msg-cp-bubble p:last-child{margin-bottom:0}
.msg-cp-bubble strong{color:var(--cream);font-weight:600}
.msg-cp-bubble em{color:var(--ember-pale);font-style:italic}
.msg-cp-bubble h3{font-family:'Montserrat',sans-serif;font-size:20px;color:var(--cream);font-weight:600;margin:0.6em 0 0.4em}
.msg-cp-bubble ul,.msg-cp-bubble ol{margin:0.3em 0 0.8em 1.3em}
.msg-cp-bubble li{margin-bottom:0.3em}
.msg-cp-bubble code{background:var(--earth-deep);border:1px solid var(--cream-faint);border-radius:3px;padding:1px 5px;font-size:12px;color:var(--ember-pale)}
.msg-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.chip-act{
  display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:0.05em;color:var(--cream-dim);
  background:transparent;border:1px solid var(--cream-faint);border-radius:5px;padding:3px 9px;cursor:pointer;transition:all 0.18s
}
.chip-act:hover{border-color:var(--ember);color:var(--ember)}
.chip-act.on{border-color:var(--ember);color:var(--ember);background:var(--ember-glow)}
.chip-act svg{width:11px;height:11px;fill:currentColor}
.cp-waiting{display:flex;gap:12px;align-items:flex-start;margin-bottom:1.75rem}
.waiting-dots{display:flex;gap:5px;padding-top:9px}
.wd{width:5px;height:5px;border-radius:50%;background:var(--ember);animation:wdp 1.6s ease-in-out infinite;opacity:0.3}
.wd:nth-child(2){animation-delay:0.25s}.wd:nth-child(3){animation-delay:0.5s}
@keyframes wdp{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-4px);opacity:1}}
.cursor-blink{display:inline-block;width:7px;height:14px;background:var(--ember);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ════ CONTROLS ════ */
.v-controls{padding:0.5rem 1.5rem 1.4rem;background:linear-gradient(transparent,var(--earth) 22%);flex-shrink:0}
.v-controls-inner{max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center}

.mic-zone{display:flex;flex-direction:column;align-items:center;gap:0.7rem;padding:0.6rem 0 0.2rem}
.mic-big{
  width:84px;height:84px;border-radius:50%;background:var(--ember);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.1s;flex-shrink:0
}
.mic-big:hover{background:var(--ember-warm)}
.mic-big:active{transform:scale(0.96)}
.mic-big svg{width:30px;height:30px;fill:var(--earth)}
.mic-big.listening{background:var(--red-err);animation:micPulse 1.4s ease-in-out infinite}
.mic-big.busy{opacity:0.4;cursor:not-allowed;animation:none}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,112,96,0.45)}50%{box-shadow:0 0 0 18px rgba(200,112,96,0)}}
.mic-status{font-size:12px;color:var(--cream-dim);letter-spacing:0.03em;min-height:1.2em;text-align:center;max-width:480px}
.mode-switch{font-size:11px;color:var(--cream-dim);background:none;border:none;cursor:pointer;text-decoration:underline;text-decoration-color:var(--cream-dim);transition:color 0.2s;padding:4px}
.mode-switch:hover{color:var(--ember)}

.text-zone{width:100%;display:flex;flex-direction:column;align-items:center;gap:0.6rem;padding-top:0.4rem}
.input-inner{width:100%;background:var(--earth-mid);border:1px solid var(--cream-faint);border-radius:12px;padding:10px 10px 10px 14px;display:flex;gap:8px;align-items:flex-end;transition:border-color 0.25s}
.input-inner:focus-within{border-color:var(--ember)}
.msg-textarea{flex:1;background:transparent;border:none;outline:none;font-family:inherit;font-size:16px;font-weight:400;color:var(--cream);resize:none;max-height:140px;line-height:1.65;caret-color:var(--ember);padding:4px 0}
.msg-textarea::placeholder{color:var(--cream-dim)}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--ember);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.1s;flex-shrink:0}
.send-btn:hover{background:var(--ember-warm)}
.send-btn:active{transform:scale(0.94)}
.send-btn:disabled{opacity:0.25;cursor:not-allowed}
.send-btn svg{width:15px;height:15px;fill:var(--earth)}

/* ════ TOAST / MODAL ════ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--earth-lift);border:1px solid var(--ember);color:var(--cream);font-size:12px;padding:8px 16px;border-radius:7px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(10,6,2,0.85);z-index:80;display:none;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal{background:var(--earth-mid);border:1px solid var(--cream-faint);border-radius:12px;padding:1.5rem;width:100%;max-width:440px;animation:riseIn 0.3s ease;max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Montserrat',sans-serif;font-size:23px;font-weight:600;color:var(--cream);margin-bottom:0.6rem}
.modal-body{font-size:13px;color:var(--cream-mid);line-height:1.75;margin-bottom:1.25rem;white-space:pre-wrap}
.modal-input{width:100%;background:var(--earth-light);border:1px solid var(--cream-faint);border-radius:7px;color:var(--cream);font-family:inherit;font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.2s;margin-bottom:1rem}
.modal-input:focus{border-color:var(--ember)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{font-family:inherit;font-size:12px;padding:8px 16px;border-radius:7px;cursor:pointer;transition:all 0.18s;border:1px solid var(--cream-faint);background:transparent;color:var(--cream-dim)}
.modal-btn.primary{background:var(--ember);border-color:var(--ember);color:var(--earth);font-weight:600}
.modal-btn.primary:hover{background:var(--ember-warm)}
.modal-btn:not(.primary):hover{border-color:var(--ember);color:var(--ember)}
.modal-btn.danger:hover{border-color:var(--red-err);color:var(--red-err)}

/* ════ RESPONSIVE ════ */
@media(max-width:560px){
  .welcome-head{font-size:36px}
  .convo-inner{padding:1.5rem 1rem 1rem}
  .v-controls{padding:0.5rem 1rem 1rem}
  .lang-select{display:none}
}
</style>
</head>
<body>

<!-- ════ KEY SCREEN ════ -->
<div class="key-screen" id="key-screen">
  <svg class="flame-icon" id="flame-svg" viewBox="0 0 52 64" fill="none">
    <path d="M26 4C26 4 36 16 36 26C36 31.5 32.5 36 26 36C19.5 36 16 31.5 16 26C16 16 26 4 26 4Z" stroke="#1b2a3d" stroke-width="2"/>
    <path d="M26 36C26 36 20 44 20 50C20 55.5 22.7 60 26 60C29.3 60 32 55.5 32 50C32 44 26 36 26 36Z" stroke="#1b2a3d" stroke-width="2"/>
    <circle cx="26" cy="50" r="4" fill="#1b2a3d" opacity="0.4"/>
    <path d="M18 22C18 22 14 28 16 34" stroke="#1b2a3d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M34 22C34 22 38 28 36 34" stroke="#1b2a3d" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </svg>
  <div class="key-input-wrap">
    <input class="key-input" id="key-input" type="text" placeholder="enter your key"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      oninput="onKeyInput(this)" onkeydown="onKeyDown(event)"/>
    <div class="key-hint" id="key-hint">&nbsp;</div>
  </div>
  <div class="key-tagline">Speak, or write. Whatever is easiest — I'm listening either way.</div>
</div>

<!-- ════ APP ════ -->
<div class="app-shell" id="app-shell">
  <header class="v-header">
    <div class="wordmark"><span class="wm-name">Counterpart</span><span class="wm-ember"></span></div>
    <span class="hdr-pill">Voice</span>
    <div class="hdr-spacer"></div>
    <select class="lang-select" id="lang-select" onchange="onLangChange(this.value)"></select>
    <button class="icon-btn" id="tts-btn" onclick="toggleTTS()" title="Spoken replies">
      <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8 8 0 0 1 0 12"/></svg>
    </button>
    <button class="icon-btn" onclick="clearConvo()" title="Clear this conversation">
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/></svg>
    </button>
    <div class="key-badge"><span class="kd"></span><span id="key-label"></span></div>
    <button class="foot-link" onclick="signOut()">Sign out</button>
  </header>

  <div class="v-main" id="v-main">
    <div class="convo-inner">
      <div class="welcome-block" id="welcome">
        <div class="welcome-rule"></div>
        <div class="welcome-head">Whatever it is, <em>say it.</em></div>
        <div class="welcome-body">Tap the circle and talk, or switch to typing. I'll stay with it from there — and I'll answer back the same way, out loud or in writing.</div>
      </div>
      <div id="feed"></div>
    </div>
  </div>

  <div class="v-controls">
    <div class="v-controls-inner">
      <div class="mic-zone" id="mic-zone">
        <button class="mic-big" id="mic-big" onclick="toggleMic()" aria-label="Speak">
          <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z"/></svg>
        </button>
        <div class="mic-status" id="mic-status">Tap to speak</div>
        <button class="mode-switch" onclick="setMode('text')">Type instead</button>
      </div>
      <div class="text-zone" id="text-zone" style="display:none">
        <div class="input-inner">
          <textarea class="msg-textarea" id="msg-input" placeholder="Type here…" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendFromText()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
        </div>
        <button class="mode-switch" onclick="setMode('voice')">Switch to voice</button>
      </div>
    </div>
  </div>
</div>

<!-- toast / modal -->
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <input class="modal-input" id="modal-input" style="display:none">
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
/* ════════ CONFIG ════════ */
// Set this to YOUR server's Railway URL after you deploy it (see README.md
// in the parent folder). Example: "https://my-company-counterpart.up.railway.app"
const SERVER = "https://counterpart-template-server-production.up.railway.app";
const VOICE_ACCESS_STORE = "cp_voice_access_v1";

const LANGS = [
  { code:"en", label:"English", speech:"en-US" },
  { code:"tw", label:"Twi",     speech:"ak-GH" },
  { code:"ga", label:"Ga",      speech:"ga-GH" },
  { code:"sw", label:"Swahili", speech:"sw-KE" },
  { code:"sn", label:"Shona",   speech:"sn-ZW" },
  { code:"es", label:"Spanish", speech:"es-ES" },
];

/* ════════ SERVER ACCESS ════════ */
function authHeaders(){ return {"Content-Type":"application/json","x-counterpart-key":currentKey}; }
async function apiGet(path){ const r=await fetch(`${SERVER}/webapi${path}`,{headers:authHeaders()}); if(!r.ok) throw new Error("request failed"); return r.json(); }
async function apiPost(path,body){ const r=await fetch(`${SERVER}/webapi${path}`,{method:"POST",headers:authHeaders(),body:JSON.stringify(body||{})}); if(!r.ok) throw new Error("request failed"); return r.json(); }
async function apiPatch(path,body){ const r=await fetch(`${SERVER}/webapi${path}`,{method:"PATCH",headers:authHeaders(),body:JSON.stringify(body||{})}); if(!r.ok) throw new Error("request failed"); return r.json(); }
async function apiDelete(path){ const r=await fetch(`${SERVER}/webapi${path}`,{method:"DELETE",headers:authHeaders()}); if(!r.ok) throw new Error("request failed"); return r.json(); }
async function verifyKeyServer(key){
  try{ const r=await fetch(`${SERVER}/webapi/auth/verify`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key})}); const d=await r.json(); return !!d.ok; }
  catch(e){ return false; }
}
function storeAccess(key){ try{ localStorage.setItem(VOICE_ACCESS_STORE,key); }catch(e){} }

/* ════════ STATE ════════ */
let currentKey="";
let activeThreadId=null;
let lang="en", mode="voice", ttsEnabled=true;
let busy=false, recognition=null, isRecording=false;

function NS(suffix){ return `cpv_${suffix}_v1__${currentKey}`; }
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(NS("prefs"))||"null");
    if(p) return p;
  }catch(e){}
  return { lang:"en", mode:"voice", tts:true };
}
function savePrefs(){ try{ localStorage.setItem(NS("prefs"),JSON.stringify({lang,mode,tts:ttsEnabled})); }catch(e){} }
function langInstruction(){
  const l=LANGS.find(x=>x.code===lang);
  if(!l || l.code==="en") return "";
  return `The person has set their preferred language to ${l.label}. Respond in ${l.label} unless they switch languages themselves.`;
}
async function syncLangContext(){
  if(!activeThreadId) return;
  try{ await apiPatch(`/threads/${activeThreadId}`,{context:langInstruction()}); }catch(e){}
}

/* ════════ UTIL ════════ */
function esc(t){ return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(t){ return esc(t).replace(/"/g,"&quot;").replace(/\n/g,"&#10;"); }
function stripMd(t){ return t.replace(/\*\*(.*?)\*\*/g,"$1").replace(/\*(.*?)\*/g,"$1").replace(/^#+\s*/gm,""); }
function formatText(t){
  let h=esc(t);
  h=h.replace(/^###\s*(.+)$/gm,"<h3>$1</h3>").replace(/^##\s*(.+)$/gm,"<h3>$1</h3>");
  h=h.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/(^|[^*])\*([^*]+?)\*/g,"$1<em>$2</em>");
  h=h.replace(/`([^`]+?)`/g,"<code>$1</code>");
  return h.split(/\n\n+/).map(p=>{
    if(/^\s*(\d+\.|[-•])\s/.test(p)){
      const ol=/^\s*\d+\./.test(p); const items=p.split(/\n/).filter(l=>l.trim()).map(l=>`<li>${l.replace(/^\s*(\d+\.|[-•])\s*/,"")}</li>`).join("");
      return `<${ol?"ol":"ul"}>${items}</${ol?"ol":"ul"}>`;
    }
    return `<p>${p.replace(/\n/g,"<br>")}</p>`;
  }).join("");
}
function speechLocale(){ const l=LANGS.find(x=>x.code===lang); return l?l.speech:"en-US"; }
function langInstruction(){
  const l=LANGS.find(x=>x.code===lang);
  if(!l || l.code==="en") return "";
  return `\n\nThe person has set their preferred language to ${l.label}. Respond in ${l.label} unless they switch languages themselves.`;
}

/* ════════ TOAST / MODALS ════════ */
function toast(msg,dur=2200){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),dur); }
function copyText(btn){ navigator.clipboard.writeText(btn.dataset.text).then(()=>toast("Copied")); }
function signOut(){ confirmModal("Sign out?","You'll need your key to return. This conversation stays saved on this device.","Sign out",()=>{ try{localStorage.removeItem(VOICE_ACCESS_STORE);}catch(e){} location.reload(); }); }
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
function confirmModal(title,body,okLabel,onOk){
  document.getElementById("modal-title").textContent=title; document.getElementById("modal-body").textContent=body;
  document.getElementById("modal-input").style.display="none";
  document.getElementById("modal-actions").innerHTML="";
  const cancel=mkBtn("Cancel","",closeModal); const ok=mkBtn(okLabel,"primary",()=>{ closeModal(); onOk&&onOk(); });
  if(/delete|sign out|remove|clear/i.test(okLabel)) ok.classList.add("danger");
  document.getElementById("modal-actions").append(cancel,ok); document.getElementById("modal").classList.add("open");
}
function infoModal(title,body,closeable){
  document.getElementById("modal-title").textContent=title; document.getElementById("modal-body").textContent=body;
  document.getElementById("modal-input").style.display="none"; document.getElementById("modal-actions").innerHTML="";
  if(closeable){ const ok=mkBtn("Done","primary",closeModal); document.getElementById("modal-actions").append(ok); }
  document.getElementById("modal").classList.add("open");
}
function mkBtn(label,cls,fn){ const b=document.createElement("button"); b.className="modal-btn "+(cls||""); b.textContent=label; b.onclick=fn; return b; }

/* ════════ CONVERSATION RENDERING ════════ */
function hideWelcome(){ const w=document.getElementById("welcome"); if(w) w.style.display="none"; }
function scrollDown(){ const sc=document.getElementById("v-main"); requestAnimationFrame(()=>sc.scrollTo({top:sc.scrollHeight,behavior:"smooth"})); }
function scrollDownSoft(){ const sc=document.getElementById("v-main"); if(sc.scrollHeight-sc.scrollTop-sc.clientHeight<160) sc.scrollTop=sc.scrollHeight; }

function appendPersonMsg(text, scroll=true){
  hideWelcome();
  const div=document.createElement("div"); div.className="msg msg-person";
  div.innerHTML=`<div class="msg-person-bubble">${esc(text).replace(/\n/g,"<br>")}</div>`;
  document.getElementById("feed").appendChild(div); if(scroll)scrollDown();
}
function appendCpMsg(text, animate=false, scroll=true){
  hideWelcome();
  const div=document.createElement("div"); div.className="msg msg-cp";
  div.innerHTML=`<div class="cp-mark"><div class="cp-mark-dot"></div></div><div class="msg-cp-inner"><div class="msg-cp-bubble"></div><div class="msg-extras"></div></div>`;
  const bubble=div.querySelector(".msg-cp-bubble"), extras=div.querySelector(".msg-extras");
  document.getElementById("feed").appendChild(div);

  function finish(){
    extras.innerHTML=`<div class="msg-actions">
        <button class="chip-act" onclick="replaySpeak(this)" data-text="${escAttr(text)}"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>Listen</button>
        <button class="chip-act" onclick="copyText(this)" data-text="${escAttr(text)}"><svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>Copy</button>
      </div>`;
  }
  if(animate){
    typewriter(bubble, text, ()=>{ finish(); if(ttsEnabled) speak(text); });
  } else {
    bubble.innerHTML=formatText(text); finish();
  }
  if(scroll!==false) scrollDown();
}
function typewriter(el, text, done){
  const tokens=text.split(/(\s+)/); let i=0;
  el.innerHTML=`<span class="raw"></span><span class="cursor-blink"></span>`;
  const raw=el.querySelector(".raw");
  function step(){
    if(i>=tokens.length){ el.innerHTML=formatText(text); done&&done(); return; }
    let chunk=""; for(let k=0;k<9&&i<tokens.length;k++,i++) chunk+=tokens[i];
    raw.textContent+=chunk; scrollDownSoft();
    setTimeout(step, 16);
  }
  step();
}
function showWaiting(){
  const feed=document.getElementById("feed");
  const div=document.createElement("div"); div.className="cp-waiting"; div.id="cp-waiting";
  div.innerHTML=`<div class="cp-mark"><div class="cp-mark-dot"></div></div><div class="waiting-dots"><div class="wd"></div><div class="wd"></div><div class="wd"></div></div>`;
  feed.appendChild(div); scrollDown();
}
function removeWaiting(){ const el=document.getElementById("cp-waiting"); if(el)el.remove(); }
function renderConvo(turns){
  const feed=document.getElementById("feed"); feed.innerHTML="";
  if(!turns.length){ document.getElementById("welcome").style.display="block"; return; }
  document.getElementById("welcome").style.display="none";
  turns.forEach(t=>{
    if(t.role==="person") appendPersonMsg(t.content,false);
    else appendCpMsg(t.content,false,false);
  });
  scrollDown();
}

/* ════════ SEND ════════ */
function setBusyUI(b){
  busy=b;
  document.getElementById("mic-big").classList.toggle("busy",b);
  document.getElementById("mic-big").disabled=b;
  document.getElementById("send-btn").disabled=b;
  if(b) document.getElementById("mic-status").textContent="Thinking…";
  else if(!isRecording) document.getElementById("mic-status").textContent="Tap to speak";
}
async function sendMessage(text){
  text=(text||"").trim();
  if(!text||busy) return;
  setBusyUI(true);
  appendPersonMsg(text);
  showWaiting();

  try{
    if(!activeThreadId){
      const d=await apiPost("/threads",{});
      activeThreadId=d.thread.id;
      await syncLangContext();
    }
    const response=await fetch(`${SERVER}/webapi/threads/${activeThreadId}/messages`,{
      method:"POST", headers:authHeaders(),
      body:JSON.stringify({text, depth:"standard"})
    });
    removeWaiting();
    if(!response.ok || !response.body){ appendCpMsg("Something went wrong on my end. Try again in a moment — I am still here.",true); }
    else{
      let fullText="";
      const reader=response.body.getReader(); const decoder=new TextDecoder(); let buf="";
      while(true){
        const {done,value}=await reader.read(); if(done)break;
        buf+=decoder.decode(value,{stream:true});
        let sep;
        while((sep=buf.indexOf("\n\n"))!==-1){
          const raw=buf.slice(0,sep); buf=buf.slice(sep+2);
          const line=raw.split("\n").find(l=>l.startsWith("data:")); if(!line)continue;
          let evt; try{ evt=JSON.parse(line.slice(5).trim()); }catch(e){ continue; }
          if(evt.type==="text") fullText+=evt.delta;
          // type:"tool" events are dropped here — voice.html has no workspace UI to
          // surface them in; the tool's effect still persists server-side.
        }
      }
      appendCpMsg(fullText || "Something went wrong on my end. Try again in a moment — I am still here.", true);
    }
  }catch(e){
    removeWaiting();
    appendCpMsg("I lost the connection. Check your internet and try again — I haven't gone anywhere.",true);
  }
  setBusyUI(false);
}
function sendFromText(){
  const inp=document.getElementById("msg-input");
  const text=inp.value.trim(); if(!text) return;
  inp.value=""; inp.style.height="auto";
  sendMessage(text);
}
function handleKey(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendFromText(); } }
function autoResize(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,140)+"px"; }
function focusInput(){ if(mode==="text") setTimeout(()=>{ const el=document.getElementById("msg-input"); if(el&&window.innerWidth>560)el.focus(); },120); }

/* ════════ VOICE ════════ */
function toggleMic(){
  if(busy) return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){ toast("Voice input isn't supported in this browser"); return; }
  if(isRecording){ if(recognition) recognition.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang=speechLocale();
  recognition.continuous=false;
  recognition.interimResults=true;
  let finalTranscript="";
  recognition.onstart=()=>{
    isRecording=true; finalTranscript="";
    document.getElementById("mic-big").classList.add("listening");
    document.getElementById("mic-status").textContent="Listening…";
  };
  recognition.onresult=e=>{
    let interim="";
    for(let i=0;i<e.results.length;i++){
      if(e.results[i].isFinal) finalTranscript+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById("mic-status").textContent=(finalTranscript+interim).trim()||"Listening…";
  };
  recognition.onend=()=>{
    isRecording=false;
    document.getElementById("mic-big").classList.remove("listening");
    const text=finalTranscript.trim();
    document.getElementById("mic-status").textContent="Tap to speak";
    if(text) sendMessage(text);
  };
  recognition.onerror=()=>{
    isRecording=false;
    document.getElementById("mic-big").classList.remove("listening");
    document.getElementById("mic-status").textContent="Tap to speak";
  };
  recognition.start();
}
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(stripMd(text).replace(/<[^>]+>/g,""));
  u.lang=speechLocale(); u.rate=0.94;
  window.speechSynthesis.speak(u);
}
function replaySpeak(btn){
  if(!window.speechSynthesis) return;
  const t=btn.dataset.text;
  if(window.speechSynthesis.speaking){ window.speechSynthesis.cancel(); btn.classList.remove("on"); return; }
  document.querySelectorAll(".chip-act.on").forEach(b=>b.classList.remove("on")); btn.classList.add("on");
  const u=new SpeechSynthesisUtterance(stripMd(t)); u.lang=speechLocale(); u.rate=0.94;
  u.onend=()=>btn.classList.remove("on");
  window.speechSynthesis.speak(u);
}

/* ════════ MODE / PREFS ════════ */
function setMode(m){
  mode=m; savePrefs();
  document.getElementById("mic-zone").style.display = m==="voice" ? "flex" : "none";
  document.getElementById("text-zone").style.display = m==="text" ? "flex" : "none";
  if(m==="voice" && isRecording && recognition) recognition.stop();
  if(m==="text") focusInput();
}
function onLangChange(v){
  lang=v; savePrefs();
  if(recognition) recognition.lang=speechLocale();
  syncLangContext();
}
function toggleTTS(){
  ttsEnabled=!ttsEnabled; savePrefs(); updateTtsBtn();
  if(!ttsEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
}
function updateTtsBtn(){
  const b=document.getElementById("tts-btn");
  b.classList.toggle("on",ttsEnabled);
  b.title = ttsEnabled ? "Spoken replies: on (tap to mute)" : "Spoken replies: off (tap to enable)";
}
function clearConvo(){
  if(!activeThreadId){ toast("Nothing to clear"); return; }
  confirmModal("Clear this conversation?","This removes everything said so far. It can't be undone.","Clear",async()=>{
    await apiDelete(`/threads/${activeThreadId}`);
    activeThreadId=null;
    document.getElementById("feed").innerHTML="";
    document.getElementById("welcome").style.display="block";
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    toast("Cleared");
  });
}

/* ════════ KEY SCREEN ════════ */
function onKeyInput(input){ document.getElementById("flame-svg").classList.toggle("alive",input.value.length>0);
  const h=document.getElementById("key-hint"); h.className="key-hint"; h.innerHTML="&nbsp;"; input.classList.remove("wrong"); }
function onKeyDown(e){ if(e.key==="Enter"){ e.preventDefault(); attemptEntry(); } }
async function attemptEntry(){
  const input=document.getElementById("key-input"), hint=document.getElementById("key-hint");
  const val=input.value.trim(); if(!val)return;
  hint.className="key-hint"; hint.textContent="checking…";
  const ok=await verifyKeyServer(val);
  if(ok){ storeAccess(val); currentKey=val; input.style.opacity="0"; document.getElementById("flame-svg").style.opacity="0";
    setTimeout(enterApp,380); }
  else{ input.classList.add("wrong"); hint.className="key-hint err"; hint.textContent="That key isn't recognised or has expired.";
    setTimeout(()=>{ input.classList.remove("wrong"); input.value=""; hint.className="key-hint"; hint.innerHTML="&nbsp;"; document.getElementById("flame-svg").classList.remove("alive"); input.style.opacity="1"; },1600); }
}

/* ════════ BOOT ════════ */
async function enterApp(){
  document.getElementById("key-screen").classList.add("gone");
  document.getElementById("app-shell").classList.add("ready");
  document.getElementById("key-label").textContent=currentKey;

  const p=loadPrefs();
  lang=p.lang||"en"; mode=p.mode||"voice"; ttsEnabled=(p.tts!==false);
  document.getElementById("lang-select").value=lang;
  updateTtsBtn();

  const active=await apiGet("/threads/active");
  activeThreadId = active.thread ? active.thread.id : null;
  renderConvo(active.turns || []);
  if(activeThreadId) await syncLangContext();
  setMode(mode);
  focusInput();
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });
(async function boot(){
  document.getElementById("lang-select").innerHTML = LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join("");
  try{ currentKey=localStorage.getItem(VOICE_ACCESS_STORE)||""; }catch(e){ currentKey=""; }
  if(currentKey && await verifyKeyServer(currentKey)){ enterApp(); }
  else{ try{ localStorage.removeItem(VOICE_ACCESS_STORE); }catch(e){} document.getElementById("key-screen").classList.remove("gone"); setTimeout(()=>document.getElementById("key-input").focus(),100); }
})();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
